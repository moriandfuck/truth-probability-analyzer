services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: truth-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - NEWS_SERVER_URL=http://newsnow:4444
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - ollama
    restart: unless-stopped

  newsnow:
    image: ghcr.io/ourongxing/newsnow:latest
    container_name: newsnow
    ports:
      - "4444:4444"
    environment:
      - HOST=0.0.0.0
      - PORT=4444
      - NODE_ENV=production
      - INIT_TABLE=true
      - ENABLE_CACHE=true
    volumes:
      - newsnow_data:/usr/app/.data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: truth-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
      - newsnow
    restart: unless-stopped

volumes:
  ollama_data:
  newsnow_data:
